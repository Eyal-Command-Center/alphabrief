name: Update Services Reference Doc

on:
  push:
    branches: [main]

jobs:
  build-doc:
    runs-on: ubuntu-latest
    permissions:
      contents: write

    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: '20'

      - name: Install docx
        run: npm install docx

      - name: Generate services doc
        run: node scripts/build-services-doc.js

      - name: Commit updated doc
        run: |
          git config user.name  "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add AlphaBrief-Services-Reference.docx
          git diff --staged --quiet || git commit -m "docs: auto-update services reference [skip ci]"
          git push
