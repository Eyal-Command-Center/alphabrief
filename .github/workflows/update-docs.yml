name: Update Services Reference Doc

on:
  push:
    branches: [main]

jobs:
  build-doc:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: '20'

      - name: Install docx
        run: npm install docx

      - name: Generate services doc
        run: node scripts/build-services-doc.js

      - name: Upload as artifact
        uses: actions/upload-artifact@v4
        with:
          name: AlphaBrief-Services-Reference
          path: AlphaBrief-Services-Reference.docx
          retention-days: 90
